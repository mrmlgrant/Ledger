<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger — Personal Finance (AU)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS ============ */
:root{
  --bg:#F6F8F6; --surface:#FFFFFF; --surface2:#F0F3EF; --ink:#1B2733; --muted:#62707E;
  --line:#E3E8E2; --line2:#CFD8CE;
  --euc:#2E7D5B; --euc-soft:#E7F1EB; --euc-ink:#1E5A40;
  --gold:#B8860B; --gold-soft:#F7EFDB;
  --red:#B4452F; --red-soft:#F8E7E2;
  --blue:#2563B8; --blue-soft:#E3ECF9;
  --orange:#E2925A; --orange-soft:#FBEFE3;
  --purple:#7A6FB3; --purple-soft:#ECE9F6;
  --grey-cell:#AEB7C0; --shadow:0 1px 2px rgba(22,30,26,.05),0 2px 8px rgba(22,30,26,.04);
  --radius:10px; --ctl-h:34px;
}
html[data-theme="dark"]{
  --bg:#10151C; --surface:#171E27; --surface2:#202A35; --ink:#E7ECEF; --muted:#94A1AF;
  --line:#28323E; --line2:#36424F;
  --euc:#4CC08E; --euc-soft:#1A3328; --euc-ink:#7FD9B0;
  --gold:#E0B554; --gold-soft:#332B16;
  --red:#E07A5F; --red-soft:#3A211B;
  --blue:#6AA3E8; --blue-soft:#1C2C44;
  --orange:#E2925A; --orange-soft:#3A2A1C;
  --purple:#A99EDB; --purple-soft:#2A2740;
  --grey-cell:#46525F; --shadow:0 1px 2px rgba(0,0,0,.4),0 6px 18px rgba(0,0,0,.3);
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--ink);
  font-feature-settings:'tnum' 1; line-height:1.45; min-height:100vh;
}
h1,h2,h3,.display{font-family:'Archivo','Inter',system-ui,sans-serif;letter-spacing:-.01em}
button,input,select,textarea{font:inherit;color:inherit}
a{color:var(--euc)}

/* ============ LAYOUT ============ */
.app{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
.sidebar{
  background:var(--surface); border-right:1px solid var(--line); padding:18px 0 14px;
  position:sticky; top:0; height:100vh; overflow-y:auto; display:flex; flex-direction:column;
}
.brand{padding:0 18px 14px;border-bottom:1px solid var(--line)}
.brand .t{font-family:'Archivo';font-weight:800;font-size:1.25rem;letter-spacing:-.02em}
.brand .s{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-top:2px}
.fy-pick{padding:12px 18px;border-bottom:1px solid var(--line)}
.fy-pick label{font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);display:block;margin-bottom:5px}
.pchips{display:flex;flex-wrap:wrap;gap:6px}
.pchips button{border:1px solid var(--line);background:var(--surface2);color:var(--ink);border-radius:999px;padding:4px 11px;font:inherit;font-size:.78rem;cursor:pointer;display:flex;align-items:center;gap:6px}
.pchips button .pd{width:8px;height:8px;border-radius:50%;flex:none}
.pchips button.active{background:var(--euc-soft);border-color:var(--euc);color:var(--euc-ink);font-weight:600}
.pchips button:hover{border-color:var(--euc)}
.personline{display:inline-flex;align-items:center;gap:6px;font-size:.8rem;color:var(--muted)}
.personline .pd{width:9px;height:9px;border-radius:50%;display:inline-block}
.nav{padding:10px 10px;flex:1}
.nav .grp{font-size:.66rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);padding:12px 10px 5px}
/* Excel-heritage sheet tabs */
.nav button{
  display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:0;
  padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--ink);font-weight:500;font-size:.92rem;
}
.nav button:hover{background:var(--surface2)}
.nav button.active{background:var(--euc-soft);color:var(--euc-ink);font-weight:600}
.nav .tabchip{width:14px;height:9px;border-radius:2px 2px 0 0;border-bottom:2px solid transparent;flex:none}
.nav button.active .tabchip{border-bottom-color:currentColor}
.sidefoot{padding:12px 18px;border-top:1px solid var(--line);display:flex;gap:8px;align-items:center;flex-wrap:wrap}

.main{padding:26px 34px 70px;max-width:1280px;width:100%}
.pagehead{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.pagehead h1{font-size:1.7rem;font-weight:800}
.pagehead .sub{color:var(--muted);font-size:.9rem;margin-top:3px;max-width:680px}
.headactions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* ============ COMPONENTS ============ */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:18px}
.card>.chead{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.card>.chead h2{font-size:1rem;font-weight:700}
.card>.chead .hint{font-size:.8rem;color:var(--muted)}
.card>.cbody{padding:16px}
.card>.cbody.tight{padding:0}
.chead .actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:1000px){.grid2,.grid3{grid-template-columns:1fr}.app{grid-template-columns:1fr}.sidebar{position:static;height:auto}}

.btn{
  border:1px solid var(--line2);background:var(--surface);border-radius:7px;padding:0 13px;height:var(--ctl-h);cursor:pointer;
  font-weight:600;font-size:.86rem;display:inline-flex;align-items:center;gap:6px;color:var(--ink);
}
.btn:hover{background:var(--surface2)}
.btn.primary{background:var(--euc);border-color:var(--euc);color:#fff}
html[data-theme="dark"] .btn.primary{color:#0d1410}
.btn.primary:hover{filter:brightness(1.07)}
.btn.danger{color:var(--red);border-color:var(--red)}
.btn.small{height:27px;padding:0 9px;font-size:.78rem}
.btn.ghost{border-color:transparent;background:none}
.btn.ghost:hover{background:var(--surface2)}
a.btn{text-decoration:none}

.input,select.input,textarea.input{
  width:100%;border:1px solid var(--line2);background:var(--surface);border-radius:7px;
  height:var(--ctl-h);padding:0 10px;font-size:.9rem;
}
textarea.input{height:auto;padding:8px 10px}
select.input{
  appearance:none;-webkit-appearance:none;
  background-image:url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='10' height='6'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%2362707E' stroke-width='1.6' fill='none' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 9px center;padding-right:26px;
}
.input:focus,.input:focus-visible{outline:2px solid var(--euc);outline-offset:1px;border-color:var(--euc)}
.input.money{text-align:right;font-variant-numeric:tabular-nums}
label.fld{display:block;font-size:.76rem;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.fldrow{display:flex;gap:12px;flex-wrap:wrap}
.fldrow>div{flex:1;min-width:130px}

table.tbl{width:100%;border-collapse:collapse;font-size:.88rem}
table.tbl th{
  text-align:left;font-size:.69rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);
  padding:9px 12px;border-bottom:1px solid var(--line);background:var(--surface2);font-weight:700;white-space:nowrap;
}
table.tbl td{padding:7px 12px;border-bottom:1px solid var(--line);vertical-align:middle;height:44px}
table.tbl tr:last-child td{border-bottom:0}
table.tbl tbody tr:hover td{background:color-mix(in srgb,var(--surface2) 55%,transparent)}
table.tbl tr.total:hover td{background:var(--surface2)}
table.tbl td.num,table.tbl th.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
table.tbl tr.total td{font-weight:700;background:var(--surface2)}
table.tbl tr.subhead td{font-weight:700;background:var(--euc-soft);color:var(--euc-ink);font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;height:36px}
table.tbl td.rowact{text-align:right;white-space:nowrap}
table.tbl td.rowact .btn{vertical-align:middle}
table.tbl input.input,table.tbl select.input{height:30px;font-size:.86rem;min-width:64px}
table.tbl select.input{min-width:96px}
table.tbl .editcell{min-width:120px}

.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
.stat .l{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600}
.stat .v{font-family:'Archivo';font-size:1.55rem;font-weight:800;margin-top:4px;font-variant-numeric:tabular-nums}
.stat .d{font-size:.78rem;color:var(--muted);margin-top:2px}
.stat.good .v{color:var(--euc)}
.stat.bad .v{color:var(--red)}
.stat.gold .v{color:var(--gold)}

.badge{display:inline-flex;align-items:center;gap:5px;font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:99px;border:1px solid;white-space:nowrap}
.badge.euc{color:var(--euc-ink);background:var(--euc-soft);border-color:var(--euc)}
.badge.gold{color:var(--gold);background:var(--gold-soft);border-color:var(--gold)}
.badge.red{color:var(--red);background:var(--red-soft);border-color:var(--red)}
.badge.blue{color:var(--blue);background:var(--blue-soft);border-color:var(--blue)}
.badge.purple{color:var(--purple);background:var(--purple-soft);border-color:var(--purple)}

/* frozen FY stamp — the signature mark */
.stamp{
  display:inline-flex;flex-direction:column;align-items:center;justify-content:center;
  border:2.5px solid var(--gold);color:var(--gold);border-radius:8px;padding:5px 12px;
  font-family:'Archivo';font-weight:800;letter-spacing:.14em;text-transform:uppercase;font-size:.68rem;
  transform:rotate(-4deg);line-height:1.25;opacity:.95;user-select:none;pointer-events:none;
}
.stamp .big{font-size:.86rem;letter-spacing:.2em}

/* WFH calendar */
.cal-month{margin-bottom:10px}
.cal-mname{font-family:'Archivo';font-weight:700;font-size:.92rem;margin:10px 0 6px}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(34px,46px));gap:3px}
.cal-dow{font-size:.64rem;text-transform:uppercase;color:var(--muted);text-align:center;font-weight:700;padding:2px 0}
.cal-day{
  aspect-ratio:1.15;border:1px solid var(--line);border-radius:6px;display:flex;align-items:center;justify-content:center;
  font-size:.8rem;cursor:pointer;background:var(--surface);font-variant-numeric:tabular-nums;position:relative;
}
.cal-day.empty{visibility:hidden}
.cal-day.weekend{background:var(--orange-soft);border-color:var(--orange);color:var(--orange);cursor:default}
.cal-day.holiday{background:var(--grey-cell);border-color:var(--grey-cell);color:var(--surface);cursor:default}
.cal-day.wfh{background:var(--wfh-user,var(--blue));border-color:var(--wfh-user,var(--blue));color:#fff;font-weight:700}
.cal-day.away{background:var(--away-user,var(--purple));border-color:var(--away-user,var(--purple));color:#fff}
.cal-day:not(.weekend):not(.holiday):hover{outline:2px solid var(--blue)}
.cal-legend{display:flex;gap:14px;flex-wrap:wrap;font-size:.78rem;color:var(--muted);margin:8px 0 4px}
.cal-legend .sw{display:inline-block;width:13px;height:13px;border-radius:3px;vertical-align:-2px;margin-right:5px;border:1px solid var(--line)}

/* charts */
.chart svg{width:100%;height:auto;display:block}
.chart .axis{font-size:10px;fill:var(--muted)}
.chart .vlab{font-size:9.5px;fill:var(--muted);font-variant-numeric:tabular-nums}
.mom-up{color:var(--euc);font-weight:700}
.mom-down{color:var(--red);font-weight:700}

/* expandable result table */
.restbl{width:100%;border-collapse:collapse;font-size:.9rem}
.restbl th{text-align:right;font-size:.69rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:7px 10px;border-bottom:1px solid var(--line);font-weight:700}
.restbl th:first-child{text-align:left}
.restbl td{padding:8px 10px;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums}
.restbl td.num{text-align:right;white-space:nowrap}
.restbl tr.grp>td{cursor:pointer;font-weight:600}
.restbl tr.grp>td:first-child::before{content:'▸';display:inline-block;width:14px;color:var(--muted);transition:transform .12s}
.restbl tr.grp.open>td:first-child::before{transform:rotate(90deg)}
.restbl tr.sub td{background:var(--surface2);color:var(--muted);font-size:.84rem;border-bottom:1px dashed var(--line)}
.restbl tr.sub td:first-child{padding-left:26px}
.restbl tr.tot td{font-weight:800;border-top:2px solid var(--line2);border-bottom:0}
.restbl tr.plain>td:first-child{padding-left:14px}

/* donut */
.donutwrap{display:flex;gap:22px;align-items:center;flex-wrap:wrap}
.donutleg{font-size:.84rem;display:grid;gap:6px}
.donutleg .sw{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:7px;vertical-align:-1px}

/* receipts */
.rcpt-thumb{width:40px;height:40px;object-fit:cover;border-radius:6px;border:1px solid var(--line);cursor:pointer}
.rcpt-file{display:inline-flex;align-items:center;gap:6px;font-size:.78rem;padding:4px 8px;border:1px solid var(--line2);border-radius:6px;cursor:pointer}

/* modal & toast */
.modal-back{position:fixed;inset:0;background:rgba(10,15,12,.5);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal{background:var(--surface);border:1px solid var(--line);border-radius:12px;max-width:660px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal .mhead{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.modal .mhead h3{font-size:1.05rem}
.modal .mbody{padding:18px}
.modal .mfoot{padding:12px 18px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:9px 18px;border-radius:9px;font-weight:600;font-size:.88rem;opacity:0;transition:opacity .25s;z-index:99;pointer-events:none}
#toast.show{opacity:1}

.note{font-size:.8rem;color:var(--muted);background:var(--surface2);border:1px solid var(--line);border-radius:8px;padding:9px 12px;margin-top:10px}
.kv{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px dashed var(--line);font-size:.9rem;align-items:center}
.kv:last-child{border-bottom:0}
.kv .k{color:var(--muted)}
.kv .v{font-weight:600;font-variant-numeric:tabular-nums}
.kv.big .v{font-family:'Archivo';font-weight:800;font-size:1.15rem}
.muted{color:var(--muted)}
.right{text-align:right}
.mt{margin-top:14px}
.searchres{border:1px solid var(--line);border-radius:8px;max-height:230px;overflow-y:auto;margin-top:6px}
.searchres button{display:flex;justify-content:space-between;width:100%;border:0;background:none;padding:8px 12px;cursor:pointer;font-size:.86rem;border-bottom:1px solid var(--line);text-align:left;color:var(--ink)}
.searchres button:hover{background:var(--euc-soft)}
.theme-toggle{margin-left:auto}
/* Dashboard stat grids: collapse to single column on mobile so dex is adjacent to its card */
@media(max-width:768px){
  .dash-stat-grid{grid-template-columns:1fr!important}
  .dash-stat-grid [style*="grid-column:1/-1"]{margin-top:0!important}
}
/* Address autocomplete dropdown */
.addr-sugg{display:none;position:absolute;top:100%;left:0;right:0;z-index:60;background:var(--surface);border:1px solid var(--line2);border-radius:8px;margin-top:2px;max-height:220px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.18)}
.addr-sugg-item{padding:8px 12px;font-size:.84rem;cursor:pointer;border-bottom:1px solid var(--line2);line-height:1.4}
.addr-sugg-item:last-child{border-bottom:none}
.addr-sugg-item:hover{background:var(--surface2)}

/* ===== CUSTOM SELECT ===== */
.csel{position:relative;display:block}
.csel-btn{
  width:100%;height:var(--ctl-h);padding:0 10px;
  border:1px solid var(--line2);background:var(--surface);border-radius:7px;
  cursor:pointer;font:inherit;font-size:.9rem;color:var(--ink);
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  text-align:left;line-height:1.3;
}
.csel-btn:hover{background:var(--surface2)}
.csel.open .csel-btn,.csel-btn:focus,.csel-btn:focus-visible{
  outline:2px solid var(--euc);outline-offset:1px;border-color:var(--euc);background:var(--surface);
}
.csel-cur{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.csel-chev{color:var(--muted);flex:none;display:block;transition:transform .15s}
.csel.open .csel-chev{transform:rotate(180deg);color:var(--euc)}
.csel-opts{
  position:absolute;top:calc(100% + 3px);left:0;right:0;min-width:max-content;
  background:var(--surface);border:1px solid var(--line2);
  border-radius:var(--radius);padding:5px 0;
  box-shadow:0 6px 24px rgba(0,0,0,.13);z-index:300;
  max-height:260px;overflow-y:auto;display:none;
}
.csel.open .csel-opts{display:block;animation:cselIn .1s ease}
@keyframes cselIn{from{opacity:0;transform:translateY(-5px)}}
.csel-opt{
  padding:8px 13px;cursor:pointer;color:var(--ink);
  font-size:.9rem;display:flex;align-items:center;gap:8px;white-space:nowrap;
}
.csel-opt:hover{background:var(--surface2)}
.csel-opt.sel{background:var(--euc-soft);color:var(--euc-ink);font-weight:600}
/* table-cell selects stay compact */
table .csel-btn{height:30px;font-size:.86rem;padding:0 7px}

/* ===== EXPANDABLE DASHBOARD STAT CARDS ===== */
.stat.xable{cursor:pointer;user-select:none;transition:box-shadow .13s,background .13s}
.stat.xable:hover{box-shadow:0 0 0 2px var(--line2),var(--shadow)}
.stat.xopen{box-shadow:0 0 0 2.5px var(--euc)!important;background:var(--surface)!important}
.stat-toggle{font-size:.62rem;color:var(--muted);text-align:right;margin-top:10px;letter-spacing:.06em;text-transform:uppercase;font-weight:600}
.stat.xopen .stat-toggle{color:var(--euc)}
.dex{
  background:var(--surface);border:2px solid var(--euc);border-radius:var(--radius);
  padding:16px 18px;margin-top:-10px;margin-bottom:18px;
  box-shadow:0 4px 18px rgba(46,125,91,.10);
}
.dex-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 0;border-bottom:1px dashed var(--line);font-size:.9rem;gap:16px;
}
.dex-row:last-child{border-bottom:0}
.dex-row.sub{padding-left:18px;font-size:.84rem}
.dex-row.sub .n{color:var(--muted)}
.dex-row.tot{
  font-weight:700;border-bottom:0;border-top:2px solid var(--line2);
  padding-top:9px;margin-top:4px;font-size:.95rem;
}
.dex-row .n{color:var(--muted);flex:1}
.dex-row .a{font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap;color:var(--ink)}
.dex-lnk{font-size:.78rem;color:var(--euc);cursor:pointer;text-decoration:none;margin-left:6px;white-space:nowrap}
.dex-lnk:hover{text-decoration:underline}


/* ═══ Custom select (csel) ═══ */
.csel{position:relative;width:100%}
.csel-trg{
  width:100%;border:1px solid var(--line2);background:var(--surface);
  border-radius:7px;height:var(--ctl-h);padding:0 10px;font-size:.9rem;
  cursor:pointer;text-align:left;display:flex;align-items:center;
  justify-content:space-between;gap:8px;color:var(--ink);font-family:inherit;
  font-feature-settings:'tnum' 1;
}
.csel-trg:hover{background:var(--surface2)}
.csel-trg:focus-visible{outline:2px solid var(--euc);outline-offset:1px}
.csel.open .csel-trg{border-color:var(--euc);border-radius:7px 7px 0 0}
.csel-arr{font-size:.6rem;color:var(--muted);transition:transform .12s;flex:none;line-height:1}
.csel.open .csel-arr{transform:rotate(180deg)}
.csel-tmpl{display:none!important}
/* floating drop rendered via JS into body */
#_csel_drop{
  border:1px solid var(--euc);border-top:0;border-radius:0 0 8px 8px;
  background:var(--surface);box-shadow:0 8px 24px rgba(0,0,0,.13);
  overflow-y:auto;
}
#_csel_drop .csel-opt{
  display:block;width:100%;border:0;background:none;padding:9px 12px;
  text-align:left;cursor:pointer;font-size:.88rem;color:var(--ink);
  border-bottom:1px solid var(--line);font-family:inherit;
}
#_csel_drop .csel-opt:last-child{border-bottom:0}
#_csel_drop .csel-opt:hover{background:var(--euc-soft);color:var(--euc-ink)}

/* ═══════════════════════════════════════════════════════════ */

'use strict';
/* =================================================================

   Each financial year carries its OWN frozen copy of tax rates:
   editing FY2027 never touches FY2026. That is the historical-
   accuracy rule, enforced structurally.
================================================================= */
const LS_KEY='ledger.au.v1';
const $=(s,el=document)=>el.querySelector(s);
const $$=(s,el=document)=>[...el.querySelectorAll(s)];
const uid=()=>Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4);
const fmt$=n=>(n<0?'-$':'$')+Math.abs(+n||0).toLocaleString('en-AU',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmt$0=n=>(n<0?'-$':'$')+Math.abs(+n||0).toLocaleString('en-AU',{maximumFractionDigits:0});

const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const todayISO=()=>new Date().toISOString().slice(0,10);
const fmtDate=iso=>{if(!iso)return'';const[y,m,d]=iso.split('-');return `${d}/${m}/${y}`;};

function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),2400);}

/* ---------- Default rate snapshots (editable in Tax settings) ----------
   Seeded from published ATO figures; always verify before lodging. */
function ratesFY2025(){return{
  brackets:[{upTo:18200,rate:0},{upTo:45000,rate:16},{upTo:135000,rate:30},{upTo:190000,rate:37},{upTo:null,rate:45}],
  lito:{max:700,t1:37500,taper1:5,t2:45000,taper2:1.5},
  medicare:{rate:2,lowerThreshold:27222,shadeRate:10},
  mls:[{min:0,rate:0},{min:97001,rate:1},{min:113001,rate:1.25},{min:151001,rate:1.5}],
  // Family MLS thresholds — roughly double the singles tiers, plus an
  // extra amount per dependent child after the first. Verify with the ATO
  // before relying on these for lodgement.
  mlsFamily:{tiers:[{min:0,rate:0},{min:194001,rate:1},{min:226001,rate:1.25},{min:302001,rate:1.5}],dependentIncrement:1500},
  wfh:{ratePerHour:0.70,hoursPerDay:7.6},
  deviceImmediateCap:300, cgtDiscount:50, centsPerKm:0.88
};}
function ratesFY2026(){const r=ratesFY2025();
  r.medicare.lowerThreshold=27222; /* update when ATO indexes */
  r.mls=[{min:0,rate:0},{min:101001,rate:1},{min:118001,rate:1.25},{min:158001,rate:1.5}];
  r.mlsFamily={tiers:[{min:0,rate:0},{min:202001,rate:1},{min:236001,rate:1.25},{min:316001,rate:1.5}],dependentIncrement:1500};
  r.centsPerKm=0.92;

}
const ATO_DEDUCTION_TYPES=['Working from home','Tax prep / managing tax affairs','Self-education','Tools & equipment','Travel & transport','Car expenses','Clothing & laundry','Phone, data & internet','Subscriptions, software & union fees','Donations & gifts','Income protection insurance','Personal super contributions','Interest & dividend deductions','Other work-related expenses'];

function newBucket(){return{
  incomes:[], dividends:[], funds:[], sales:[], fundPayments:[],
  wfh:{days:{},hoursPerDay:null},
  property:{expenses:[]},
  other:[], devices:[],
  expenses:[],
  preTaxDeds:[], // salary-sacrifice: additional super, novated lease, etc — reduce taxable income, not "deductions" claimed at tax time
  summaryOpts:{medicare:true,mls:false,hasCover:true}
};}
function newFY(startYear,rates){
  const people={};(DB?DB.people:[{id:'p1'}]).forEach(pp=>people[pp.id]=newBucket());
  return{
  startYear, label:`FY${String(startYear).slice(2)}–${String(startYear+1).slice(2)}`,
  displayName:'', rangeStart:null, rangeEnd:null,
  locked:false, rates, extraHolidays:[], removedHolidays:[], webHolidays:null,
  budgets:[],
  mlsFamily:{enabled:false,dependents:1}, // household-wide: combined MLS thresholds for couples/families
  people
};}

let DB=null;
const PERSON_COLS=['#2E7D5B','#2563B8','#B4452F','#7A6FB3','#B8860B','#4FA3A5'];
function defaultDB(){
  DB={people:[{id:'p1',name:'Me',color:PERSON_COLS[0]}]};
  const fy25=newFY(2024,ratesFY2025()), fy26=newFY(2025,ratesFY2026());
  return{ver:3,theme:'light',currentFY:'2025',currentPid:'p1',
    people:[{id:'p1',name:'Me',color:PERSON_COLS[0]}],
    platforms:['Stake','Superhero','CommSec','SelfWealth'],
    assets:[], nw:{items:[],entries:[]},
    gdrive:{clientId:'',token:'',tokenExpiry:0},
    rcptMeta:{},
    _syncTs:0, _syncDevice:'',
    vicGovApiKey:'', _vicGovLastError:'',
    years:{'2024':fy25,'2025':fy26}};
}
function migrate(db){
  if(db.ver>=2)return db;
  // v1 -> v2: wrap each year's records in a per-person bucket
  db.people=[{id:'p1',name:'Me',color:PERSON_COLS[0]}];
  db.currentPid='p1';
  Object.values(db.years).forEach(y=>{
    const b=newBucket();
    ['incomes','dividends','funds','sales','other','devices','netWorthExtras'].forEach(k=>{b[k]=y[k]||b[k];delete y[k];});
    b.wfh=y.wfh||b.wfh;delete y.wfh;
    b.property=y.property||b.property;delete y.property;
    if(y.summaryOpts){b.summaryOpts=y.summaryOpts;delete y.summaryOpts;}
    y.people={p1:b};
    y.budgets=y.budgets||[];
    y.webHolidays=y.webHolidays||null;
  });
  db.ver=2;
  return db;
}
function migrateV3(db){
  // One-time v2 -> v3 STRUCTURAL change (netWorthExtras -> nw.items/entries).
  // Gated on version since re-running it would duplicate nw items/entries.
  if(db.ver<3){
    db.nw=db.nw||{items:[],entries:[]};
    Object.values(db.years).forEach(y=>{
      Object.entries(y.people||{}).forEach(([pid,b])=>{
        (b.netWorthExtras||[]).forEach(e=>{
          let it=db.nw.items.find(x=>x.pid===pid&&x.name===e.n);
          if(!it){it={id:uid(),pid,name:e.n,kind:(num(e.v)>=0?'asset':'liability')};db.nw.items.push(it);}
          db.nw.entries.push({id:uid(),itemId:it.id,date:`${y.startYear+1}-06-30`,value:num(e.v)});
        });
        delete b.netWorthExtras;
      });
    });
    db.ver=3;
  }
  // Everything below is ADDITIVE and IDEMPOTENT — "ensure this field/shape
  // exists" — and must run on EVERY load regardless of db.ver, since new
  // fields get added to this list over time as the app evolves. Gating
  // these on db.ver>=3 (as a single block) meant every migration added
  // after the very first v3 release silently never ran for existing users.
  db.platforms=db.platforms||['Stake','Superhero','CommSec','SelfWealth'];
  db.assets=db.assets||[];
  db.nw=db.nw||{items:[],entries:[]};
  db.gdrive=db.gdrive||{clientId:'',token:'',tokenExpiry:0};
  if(db.gdrive.folderId!==undefined)delete db.gdrive.folderId;
  db.rcptMeta=db.rcptMeta||{};
  if(db.vicGovApiKey===undefined)db.vicGovApiKey='';
  if(db._vicGovLastError===undefined)db._vicGovLastError='';
  Object.values(db.years).forEach(y=>{
    Object.values(y.people||{}).forEach(b=>{
      b.fundPayments=b.fundPayments||[];
      if(b.summaryOpts)delete b.summaryOpts.help;
      if(!b.preTaxDeds)b.preTaxDeds=[];
    });
    if(y.rates)delete y.rates.help;
    (y.budgets||[]).forEach(bd=>Object.values(bd.opts||{}).forEach(o=>delete o.help));
    if(!y.mlsFamily)y.mlsFamily={enabled:false,dependents:1};
    if(y.displayName===undefined)y.displayName='';
    if(y.rangeStart===undefined)y.rangeStart=null;
    if(y.rangeEnd===undefined)y.rangeEnd=null;
  });
  // Asset creation previously omitted `pid`, silently attributing every
  // asset to people[0] via a fallback in assetsForPerson(). Make that
  // explicit now so per-person filtering is consistent and future edits
  // don't accidentally reassign ownership.
  (db.assets||[]).forEach(a=>{if(!a.pid)a.pid=db.people[0]?.id;});
  return db;
}

function pdot(p,sz){return `<span class="pd" style="background:${p.color};${sz?'width:'+sz+'px;height:'+sz+'px;':''}"></span>`;}
function fyLabel(y){return y?y.label:'';}

  if(!y)return'';
  if(y.displayName)return y.displayName;
  // If a custom start date is set, derive the label from it rather than the original startYear
  if(y.rangeStart){

function fyLabelFromStart(startISO){
  if(!startISO)return '';
  const yr=parseInt(startISO.slice(0,4));
  return isNaN(yr)?'':(`FY${String(yr).slice(2)}–${String(yr+1).slice(2)}`);
}
function fyRange(y){return{start:y.rangeStart||`${y.startYear}-07-01`,end:y.rangeEnd||`${y.startYear+1}-06-30`};}
function fyIsPast(y){const end=y.rangeEnd||`${y.startYear+1}-06-30`;return new Date()>new Date(end+'T23:59:59');}

/* ---------- Victorian public holidays ---------- */
function easter(y){const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31),da=((h+l-7*m+114)%31)+1;return new Date(Date.UTC(y,mo-1,da));}
const iso=d=>d.toISOString().slice(0,10);
const addD=(d,n)=>{const x=new Date(d);x.setUTCDate(x.getUTCDate()+n);return x;};
function nthMonday(y,month,n){const d=new Date(Date.UTC(y,month,1));const off=(8-d.getUTCDay())%7;d.setUTCDate(1+off+(n-1)*7);return d;}
function firstTuesday(y,month){const d=new Date(Date.UTC(y,month,1));const off=(9-d.getUTCDay())%7;d.setUTCDate(1+off);return d;}
const GF_EVE={2023:'2023-09-29',2024:'2024-09-27',2025:'2025-09-26',2026:'2026-09-25',2027:'2027-09-24'}; // AFL GF eve; future years estimated — editable in settings
function vicHolidaysCalYear(y){
  const H=[];const push=(d,n)=>H.push({date:typeof d==='string'?d:iso(d),name:n});
  const sub=(d,n)=>{const dt=new Date(d+'T00:00:00Z');const dow=dt.getUTCDay();push(d,n);if(dow===6)push(iso(addD(dt,2)),n+' (substitute)');if(dow===0)push(iso(addD(dt,1)),n+' (substitute)');};
  sub(`${y}-01-01`,"New Year's Day"); sub(`${y}-01-26`,'Australia Day');
  push(nthMonday(y,2,2),'Labour Day');
  const es=easter(y);push(addD(es,-2),'Good Friday');push(addD(es,-1),'Saturday before Easter');push(es,'Easter Sunday');push(addD(es,1),'Easter Monday');
  push(`${y}-04-25`,'Anzac Day');
  push(nthMonday(y,5,2),"King's Birthday");
  const gf=GF_EVE[y]||iso((()=>{const d=new Date(Date.UTC(y,8,30));while(d.getUTCDay()!==5)d.setUTCDate(d.getUTCDate()-1);return d;})());
  push(gf,'Friday before AFL Grand Final (est.)');
  push(firstTuesday(y,10),'Melbourne Cup');
  sub(`${y}-12-25`,'Christmas Day'); sub(`${y}-12-26`,'Boxing Day');
  return H;
}
function fyHolidays(y){
  const {start,end}=fyRange(y);
  let H=(y.webHolidays&&y.webHolidays.list&&y.webHolidays.list.length)
    ? y.webHolidays.list.filter(h=>h.date>=start&&h.date<=end)
    : [...vicHolidaysCalYear(y.startYear),...vicHolidaysCalYear(y.startYear+1)].filter(h=>h.date>=start&&h.date<=end);
  H=H.filter(h=>!(y.removedHolidays||[]).includes(h.date));
  (y.extraHolidays||[]).forEach(h=>H.push(h));
  const seen=new Set();
  return H.filter(h=>seen.has(h.date)?false:(seen.add(h.date),true)).sort((a,b)=>a.date<b.date?-1:1);
}

/* ---------- TAX ENGINE — always pass a specific FY's rates ---------- */
function incomeTax(taxable,R){let tax=0,prev=0;
  for(const b of R.brackets){const cap=b.upTo==null?Infinity:b.upTo;if(taxable>prev)tax+=(Math.min(taxable,cap)-prev)*(b.rate/100);prev=cap;if(taxable<=cap)break;}
  return Math.max(0,tax);}
function litoOffset(taxable,R){const L=R.lito;if(!L)return 0;
  if(taxable<=L.t1)return L.max;
  if(taxable<=L.t2)return Math.max(0,L.max-(taxable-L.t1)*(L.taper1/100));
  const atT2=L.max-(L.t2-L.t1)*(L.taper1/100);
  return Math.max(0,atT2-(taxable-L.t2)*(L.taper2/100));}
function medicareLevy(taxable,R){const M=R.medicare;if(!M||!M.rate)return 0;
  if(taxable<=M.lowerThreshold)return 0;
  return Math.min(taxable*(M.rate/100),(taxable-M.lowerThreshold)*((M.shadeRate||10)/100));}
function mlsSurcharge(income,R,hasCover){if(hasCover)return 0;let rate=0;
  for(const t of R.mls)if(income>=t.min)rate=t.rate;return income*(rate/100);}
function fullTax(taxable,R,opt){opt=opt||{};
  const base=incomeTax(taxable,R);
  const lito=Math.min(litoOffset(taxable,R),base);
  const med=opt.medicare===false?0:medicareLevy(taxable,R);
  let mls=0;
  if(opt.mls&&!opt.hasCover){
    mls=opt.mlsRate!=null?taxable*(opt.mlsRate/100):mlsSurcharge(taxable,R,opt.hasCover);
  }
  return{base,lito,medicare:med,mls,total:Math.max(0,base-lito)+med+mls};}


/* ---------- Public holiday auto-fetch ----------
   Tries the Victorian Government Important Dates dataset (data.vic.gov.au)
   first, then the keyless Nager.Date API filtered to AU-VIC. The computed
   calendar above stays as the offline fallback. Locked FYs are never touched. */
const DATAVIC_RESOURCE='caaa47de-8626-46a6-aa28-3d948c15c5d9';
function holNormDate(v){
  if(v==null)return null;v=String(v).trim();
  let m=v.match(/^(\d{4})-(\d{2})-(\d{2})/);if(m)return `${m[1]}-${m[2]}-${m[3]}`;
  m=v.match(/^(\d{4})(\d{2})(\d{2})$/);if(m)return `${m[1]}-${m[2]}-${m[3]}`;
  m=v.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(m)return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  const d=new Date(v);return isNaN(d)?null:d.toISOString().slice(0,10);
}
/* Normalises a "type"/"category" field value for comparison, e.g.
   "Public Holiday", "PUBLIC_HOLIDAY", "public-holiday" all become "PUBLICHOLIDAY".
   The Vic Gov Important Dates dataset (and its v2 API) use several date
   types — PUBLIC_HOLIDAY, SCHOOL_TERM, SCHOOL_HOLIDAY, DAYLIGHT_SAVING,
   PARLIAMENT_SITTING, MULTI_FAITH — and a loose /holiday/i match incorrectly
   pulls in SCHOOL_HOLIDAY / SCHOOL_TERM records too. We need an exact match
   on PUBLIC_HOLIDAY only. */
function normHolType(s){return String(s||'').toUpperCase().replace(/[^A-Z]/g,'');}
/* ---------- Vic Gov Important Dates API v2.0 (api.vic.gov.au) ----------
   Requires a free API key from developer.vic.gov.au. Unlike the CKAN
   discovery API below, this is filtered server-side by exact date type
   AND date range — i.e. ?type=PUBLIC_HOLIDAY&start_date=...&end_date=...
   covering exactly this FY's start/end dates (inclusive), so we never
   pull school terms or out-of-range years. */
/* Vic Gov Important Dates API v2 — auth scheme isn't fully documented
   publicly, and api.vic.gov.au may not send CORS headers for browser
   requests from a different origin (e.g. github.io), so we:
   1. Try several plausible auth header / query-param combinations
      (Apigee-style `apikey`, Azure APIM-style `Ocp-Apim-Subscription-Key`,
      and `subscription-key` query param).
   2. If a direct request fails (network/CORS error), retry the same
      request through a CORS proxy (same pattern as the ASX price fetcher).
   Stores the last error on DB._vicGovLastError so the Settings UI can show
   the user what actually went wrong, for diagnosis. */
async function fetchHolidaysVicV2(start,end,apiKey){
  if(!apiKey)throw new Error('no API key configured');
  const base=`https://api.vic.gov.au/vicgov/v2.0/dates?type=PUBLIC_HOLIDAY&start_date=${start}&end_date=${end}&limit=200`;
  const attempts=[
    {url:base+`&apikey=${encodeURIComponent(apiKey)}`,headers:{'apikey':apiKey}},
    {url:base,headers:{'Ocp-Apim-Subscription-Key':apiKey}},
    {url:base+`&subscription-key=${encodeURIComponent(apiKey)}`,headers:{}},
    {url:base,headers:{'Authorization':'Bearer '+apiKey}},
  ];
  // Try direct first, then through CORS proxies (each proxy wraps the
  // response differently, so handle each shape). A 522 from corsproxy.io
  // means ITS connection to the target timed out — trying a different
  // proxy with a different network path can succeed where it didn't.
  const proxies=[
    {name:'direct',wrap:u=>u,unwrap:async res=>res.json()},
    {name:'corsproxy.io',wrap:u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,unwrap:async res=>res.json()},
    {name:'allorigins.win',wrap:u=>`https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,unwrap:async res=>{const w=await res.json();return JSON.parse(w.contents||'{}');}},
  ];
  const errors=[];
  for(const a of attempts){
    for(const proxy of proxies){
      try{
        const res=await fetch(proxy.wrap(a.url),{headers:proxy.name==='direct'?a.headers:{}});
        if(!res.ok){errors.push(`${proxy.name}: HTTP ${res.status}`);continue;}
        const js=await proxy.unwrap(res);
        const recs=js.dates||js.results||js.data||js.records||(Array.isArray(js)?js:[]);
        if(!Array.isArray(recs)||!recs.length){errors.push(`${proxy.name}: empty/unexpected response — ${JSON.stringify(js).slice(0,100)}`);continue;}
        const out=[];
        recs.forEach(r=>{
          if(r.type&&normHolType(r.type)!=='PUBLICHOLIDAY')return;
          const dateRaw=r.date||r.start_date||r.event_date||r.holiday_date;
          const date=holNormDate(dateRaw);
          const name=r.title||r.name||r.description||r.summary||'Public holiday';
          if(date&&date>=start&&date<=end)out.push({date,name:String(name)});
        });
        if(!out.length){errors.push(`${proxy.name}: records returned but none matched PUBLIC_HOLIDAY in range`);continue;}
        DB._vicGovLastError='';
        return out;
      }catch(e){errors.push(`${proxy.name}: ${e.message}`);}
    }
  }
  DB._vicGovLastError=errors.join(' | ').slice(0,300)||'unknown error';
  throw new Error(DB._vicGovLastError);
}
/* CKAN's datastore_search API has no server-side "start_date"/"end_date"
   params (unlike the v2 API), and the underlying date column's raw format
   isn't consistent enough to trust a SQL range comparison via
   datastore_search_sql. So instead we fetch the full dataset (limit=2000
   comfortably covers it) and apply the FY's exact start/end dates — plus
   the PUBLIC_HOLIDAY type filter — as soon as each record is normalised,
   right here, so callers always get pre-filtered results. */
async function fetchHolidaysDataVic(start,end){
  const url=`https://discover.data.vic.gov.au/api/3/action/datastore_search?resource_id=${DATAVIC_RESOURCE}&limit=2000`;
  const js=await(await fetch(url)).json();
  const recs=(js.result&&js.result.records)||[];
  const out=[];
  recs.forEach(r=>{
    const keys=Object.keys(r);
    const typeK=keys.find(k=>/type|category/i.test(k));
    const dateK=keys.find(k=>/date/i.test(k)&&k!==typeK);
    const nameK=keys.find(k=>/name|title|holiday|description/i.test(k)&&!/date/i.test(k));
    if(!dateK)return;
    // Only keep records explicitly typed as PUBLIC_HOLIDAY — excludes
    // SCHOOL_HOLIDAY, SCHOOL_TERM and other date types that also contain
    // the substring "holiday".
    if(typeK&&normHolType(r[typeK])!=='PUBLICHOLIDAY')return;
    const date=holNormDate(r[dateK]);
    if(!date)return;
    // Restrict to the FY's exact start/end dates (inclusive), if provided.
    if(start&&date<start)return;
    if(end&&date>end)return;
    out.push({date,name:nameK?String(r[nameK]):'Public holiday'});
  });
  return out;
}
async function fetchHolidaysNager(calYear){
  const res=await fetch(`https://date.nager.at/api/v3/PublicHolidays/${calYear}/AU`);
  if(!res.ok)throw new Error('HTTP '+res.status);
  const js=await res.json();
  return js.filter(h=>!h.counties||h.counties.includes('AU-VIC'))
    .map(h=>({date:h.date,name:h.localName||h.name}));
}
async function fetchHolidaysForFY(y){
  const {start,end}=fyRange(y);
  // Each "source" published the FULL Victorian public-holiday calendar in
  // its own right — but any one of them may only have partial/incomplete
  // coverage for a given FY (e.g. a government dataset that hasn't yet been
  // updated for next year, or only covers one calendar year of a
  // July–June FY). Rather than picking ONE source and "topping up" gaps
  // (which previously broke when a source returned even a single date in
  // each half of the FY, masking a much larger gap), we now query EVERY
  // available source and take the UNION of all dates returned, deduplicated.
  // This guarantees completeness as long as at least one source has each
  // holiday, while still reporting which sources actually contributed.
  let list=[];
  const sources=[];
  const addAll=(arr,name)=>{
    let added=0;
    arr.forEach(h=>{if(!list.some(x=>x.date===h.date)){list.push(h);added++;}});
    if(added)sources.push(name);
  };
  // 1. Vic Gov Important Dates API v2 (requires API key) — most precise:
  //    server-side filtered to PUBLIC_HOLIDAY only, within this FY's exact
  //    start/end dates (inclusive).
  if(DB.vicGovApiKey){
    try{addAll(await fetchHolidaysVicV2(start,end,DB.vicGovApiKey),'api.vic.gov.au');}catch(e){DB._vicGovLastError=e.message;}
  }
  // 2. CKAN discovery dataset (no key needed) — fetched in full then
  //    filtered client-side to this FY's range and to PUBLIC_HOLIDAY type.
  try{addAll(await fetchHolidaysDataVic(start,end),'data.vic.gov.au');}catch(e){}
  // 3. Nager.at — covers the FY by querying both calendar years it spans.
  try{
    const a=await fetchHolidaysNager(y.startYear).catch(()=>[]);
    const b=await fetchHolidaysNager(y.startYear+1).catch(()=>[]);
    addAll([...a,...b].filter(h=>h.date>=start&&h.date<=end),'date.nager.at');
  }catch(e){}
  // 4. Built-in calendar — always available as a final safety net.
  addAll([...vicHolidaysCalYear(y.startYear),...vicHolidaysCalYear(y.startYear+1)]
    .filter(h=>h.date>=start&&h.date<=end),'built-in calendar');
  if(!list.length)throw new Error('no holidays returned');
  list=list.sort((a,b)=>a.date<b.date?-1:1);
  return{source:sources.join(' + ')||'built-in calendar',fetchedAt:todayISO(),list};
}
async function refreshHolidays(y,opts){
  opts=opts||{};
  if(y.locked){if(!opts.silent)toast(y.label+' is locked \u2014 holidays frozen');return false;}
  try{
    const wh=await fetchHolidaysForFY(y);
    const before=JSON.stringify((y.webHolidays||{}).list||null);
    y.webHolidays=wh;save();
    const changed=before!==JSON.stringify(wh.list);
    if(!opts.silent||changed)toast(`Public holidays ${changed?'updated':'checked'} from ${wh.source}`);
    if(changed&&(currentPage==='wfh'||currentPage==='settings'))render();
    return true;
  }catch(e){
    if(!opts.silent)toast('Couldn\u2019t reach a holiday service \u2014 using the built-in calendar');
    return false;
  }
}
function autoRefreshHolidays(){
  const y=FY();
  if(!y||y.locked)return;
  const last=y.webHolidays&&y.webHolidays.fetchedAt;
  const stale=!last||(Date.now()-new Date(last).getTime())>30*864e5;
  if(stale)refreshHolidays(y,{silent:true});
}

/* ---------- SVG chart helpers ---------- */
function chartFmt(n){
  const a=Math.abs(n);
  if(a>=1e6)return (n/1e6).toFixed(1)+'M';
  if(a>=1e3)return (n/1e3).toFixed(a>=1e4?0:1)+'k';
  return String(Math.round(n));
}
function barChartSVG(data,opts){ /* data:[{label,value,value2?}] */
  opts=opts||{};
  const W=620,H=190,padL=8,padB=18,padT=14;
  const color1=opts.color||'var(--euc)';
  const max=Math.max(1,...data.map(d=>num(d.value)+num(d.value2)));
  const bw=(W-padL*2)/data.length;
  let bars='';
  data.forEach((d,i)=>{
    const v1=num(d.value),v2=num(d.value2);
    const h1=(H-padB-padT)*v1/max, h2=(H-padB-padT)*v2/max;
    const x=padL+i*bw+bw*0.14, w=bw*0.72;
    if(v2)bars+=`<rect x="${x}" y="${H-padB-h1-h2}" width="${w}" height="${h2}" rx="2" fill="var(--gold)" opacity=".85"><title>${esc(d.label)} — ${esc(opts.label2||'')}: ${fmt$(v2)}</title></rect>`;
    bars+=`<rect x="${x}" y="${H-padB-h1}" width="${w}" height="${Math.max(h1,v1>0?1.5:0)}" rx="2" fill="${color1}" opacity=".92"><title>${esc(d.label)}: ${fmt$(v1)}</title></rect>`;
    if(v1+v2>0)bars+=`<text class="vlab" x="${x+w/2}" y="${H-padB-h1-h2-4}" text-anchor="middle">${chartFmt(v1+v2)}</text>`;
    bars+=`<text class="axis" x="${x+w/2}" y="${H-5}" text-anchor="middle">${esc(d.label)}</text>`;
  });
  return `<div class="chart"><svg viewBox="0 0 ${W} ${H}" role="img" aria-label="${esc(opts.aria||'Bar chart')}">
    <line x1="${padL}" y1="${H-padB}" x2="${W-padL}" y2="${H-padB}" stroke="var(--line2)"/>
    ${bars}</svg></div>`;
}
function lineChartSVG(pts,opts){ /* pts:[{label,value}] */
  opts=opts||{};
  const W=620,H=200,padL=10,padR=10,padB=20,padT=16;
  if(!pts.length)return '<div class="muted">No data yet.</div>';
  const vals=pts.map(p=>num(p.value));
  let lo=Math.min(...vals),hi=Math.max(...vals);
  if(lo===hi){lo-=1;hi+=1;}
  const span=hi-lo;lo-=span*0.08;hi+=span*0.08;
  const X=i=>pts.length===1?W/2:padL+(W-padL-padR)*i/(pts.length-1);
  const Y=v=>padT+(H-padB-padT)*(1-(v-lo)/(hi-lo));
  const path=pts.map((p,i)=>`${i?'L':'M'}${X(i).toFixed(1)},${Y(num(p.value)).toFixed(1)}`).join(' ');
  const area=`${path} L${X(pts.length-1).toFixed(1)},${H-padB} L${X(0).toFixed(1)},${H-padB} Z`;
  const step=pts.length>18?Math.ceil(pts.length/9):pts.length>12?2:1;
  const dots=pts.map((p,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(num(p.value)).toFixed(1)}" r="3.5" fill="var(--euc)"><title>${esc(p.label)}: ${fmt$(p.value)}</title></circle>`).join('');
  const valLbls=pts.map((p,i)=>{if(i%step!==0&&i!==pts.length-1)return'';const cx=X(i).toFixed(1),cy=(Y(num(p.value))-10).toFixed(1);return`<text class="vlab" x="${cx}" y="${cy}" text-anchor="middle">${chartFmt(p.value)}</text>`;}).join('');
  const axStep=Math.max(1,Math.ceil(pts.length/10));
  const labels=pts.map((p,i)=>i%axStep?'':`<text class="axis" x="${X(i).toFixed(1)}" y="${H-5}" text-anchor="middle">${esc(p.label)}</text>`).join('');
  const zero=(lo<0&&hi>0)?`<line x1="${padL}" y1="${Y(0).toFixed(1)}" x2="${W-padR}" y2="${Y(0).toFixed(1)}" stroke="var(--line2)" stroke-dasharray="3 3"/>`:'';
  return `<div class="chart"><svg viewBox="0 0 ${W} ${H}" role="img" aria-label="${esc(opts.aria||'Line chart')}">
    ${zero}<path d="${area}" fill="var(--euc)" opacity=".10"/><path d="${path}" fill="none" stroke="var(--euc)" stroke-width="2.2" stroke-linejoin="round"/>${dots}${valLbls}${labels}</svg></div>`;
}
const FY_MONTHS=['Jul','Aug','Sep','Oct','Nov','Dec','Jan','Feb','Mar','Apr','May','Jun'];
function monthIndexFY(dateISO){const mm=+dateISO.slice(5,7);return (mm+5)%12;} // Jul=0 … Jun=11

/* ---------- Travel distance helpers (Nominatim geocode + OSRM routing) ---------- */
async function geocodeAU(addr){
  const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(addr)}&format=json&limit=1&countrycodes=au`,
    {headers:{'Accept-Language':'en-AU','User-Agent':'LedgerAU/3.0'}});
  if(!r.ok)throw new Error('Geocode failed');

  return{lat:+j[0].lat,lng:+j[0].lon,display:j[0].display_name};
}
async function roadDistKm(from,to){
  const r=await fetch(`https://router.project-osrm.org/route/v1/driving/${from.lng},${from.lat};${to.lng},${to.lat}?overview=false`);
  if(!r.ok)throw new Error('Routing failed');
  const j=await r.json();
  if(j.code!=='Ok')throw new Error('No route found');
  return j.routes[0].distance/1000; // metres → km
}
async function calcTravelDistance(fromAddr,toAddr){
  toast('Calculating route…');
  const [a,b]=await Promise.all([geocodeAU(fromAddr),geocodeAU(toAddr)]);
  const km=await roadDistKm(a,b);
  return Math.round(km*10)/10;
}

/* ---------- Expense recurrence helpers ---------- */
const RECURRENCE_OPTS=[['weekly','Weekly (×52)'],['fortnightly','Fortnightly (×26)'],['monthly','Monthly (×12)'],['quarterly','Quarterly (×4)'],['yearly','Yearly (×1)'],['once','One-off']];
const PRETAX_DED_TYPES=['Additional super contributions','Novated lease','Workplace giving','Other salary sacrifice'];
const EXPENSE_CATS=['Housing','Transport','Food & groceries','Utilities','Insurance','Healthcare','Entertainment','Education','Clothing','Subscriptions','Travel','Investment / savings','Other'];
function yearlyFromRec(amount,rec){const m={weekly:52,fortnightly:26,monthly:12,quarterly:4,yearly:1,once:1};return amount*(m[rec]||12);}
function monthlyFlowForFY(exp,y){
  // Returns 12-element array (Jul=0 … Jun=11) of amounts
  const r=new Array(12).fill(0);
  const monthly=yearlyFromRec(num(exp.amount),exp.recurrence)/12;
  switch(exp.recurrence){
    case 'weekly':case 'fortnightly':case 'monthly':case 'quarterly':
      r.fill(monthly);break;
    case 'yearly':case 'once':
      if(exp.date){const i=monthIndexFY(exp.date);if(i>=0&&i<12)r[i]+=num(exp.amount);}
      break;
    default:r.fill(monthly);
  }
  return r;
}
function incomeMonthlyForFY(b){
  const r=new Array(12).fill(0);
  b.incomes.forEach(inc=>{
    if(inc.recurring===false&&inc.date){r[monthIndexFY(inc.date)]+=num(inc.yearly);}
    else{r.forEach((_,i)=>{r[i]+=num(inc.yearly)/12;});}
  });
  b.dividends.forEach(d=>{if(d.date&&num(d.payment))r[monthIndexFY(d.date)]+=num(d.payment);});
  (b.fundPayments||[]).forEach(p=>{if(p.date&&num(p.amount))r[monthIndexFY(p.date)]+=num(p.amount);});
  return r;
}
/* Distributes a budget row's yearly amount across the 12 FY months
   (Jul=0..Jun=11), based on its `per` schedule:
   - weekly/monthly: spread evenly across all 12 months
   - bi-annual: half the yearly amount in each of its two occurrence months
   - yearly: the full amount in its one occurrence month
   `schedDay` for yearly/bi-annual is a CALENDAR month (1=Jan..12=Dec),
   converted to an FY-month-index here. */
function budCalMonthToFYIdx(calMonth){return((num(calMonth)||1)-7+12)%12;}
function budMonthlyFlow(rows){
  const r=new Array(12).fill(0);
  (rows||[]).forEach(row=>{
    const per=row.per||'m';
    const yearly=yrOf(row);
    if(per==='y'){
      r[budCalMonthToFYIdx(row.schedDay)]+=yearly;
    }else if(per==='b'){
      const m1=num(row.schedDay)||1,m2=((m1-1+6)%12)+1;
      const half=yearly/2;
      r[budCalMonthToFYIdx(m1)]+=half;
      r[budCalMonthToFYIdx(m2)]+=half;
    }else{
      const monthly=yearly/12;
      for(let i=0;i<12;i++)r[i]+=monthly;
    }
  });
  return r;
}
function expensesMonthlyForFY(b){
  const r=new Array(12).fill(0);
  (b.expenses||[]).forEach(e=>{
    const m=monthlyFlowForFY(e,null);
    m.forEach((v,i)=>{r[i]+=v;});
  });
  // Investment property expenses (entered via Assets → property card →
  // "Deductions by financial year") are one-off dated items, not part of
  // b.expenses — but they're real cashflow, so include them in the monthly
  // expenses chart too.
  (b.property?.expenses||[]).forEach(e=>{
    if(!e.date)return;
    const i=monthIndexFY(e.date);
    if(i>=0&&i<12)r[i]+=num(e.amount);
  });
  return r;
}

/* ---------- Rental income calculation ---------- */
function rentalYearly(amount, frequency){
  const map={weekly:52,fortnightly:26,monthly:12,quarterly:4,yearly:1};
  return num(amount)*(map[frequency]||52);
}
function rentalIncomeForFY(asset, y){
  const hist=(asset.rental?.history||[]).slice().sort((a,b)=>a.startDate<b.startDate?-1:1);
  if(!hist.length)return 0;
  const {start,end}=fyRange(y);
  let total=0;
  hist.forEach((period,i)=>{
    const nextStart=hist[i+1]?.startDate||null;
    // Period runs from period.startDate until next period starts (or forever)
    const pStart=period.startDate,pEnd=nextStart;
    // Intersect with FY
    const oStart=pStart>start?pStart:start;
    const oEnd=(pEnd&&pEnd<end)?pEnd:end;
    if(oStart>=oEnd)return;
    const days=(new Date(oEnd+'T00:00:00Z')-new Date(oStart+'T00:00:00Z'))/86400000;
    const daily=rentalYearly(period.amount,period.frequency)/365.25;
    total+=daily*days;
  });
  return Math.round(total*100)/100;
}
function rentalCurrentRate(asset){
  const hist=(asset.rental?.history||[]).slice().sort((a,b)=>a.startDate<b.startDate?-1:1);
  const today=todayISO();
  let cur=null;
  for(const p of hist){if(p.startDate<=today)cur=p;}
  return cur;
}

/* ---------- Address autocomplete (Nominatim/OSM — same free service used
   for distance calculation, no API key needed) ---------- */
let _addrDebounce={};
async function addrAutocomplete(input,suggId){
  const q=input.value.trim();
  const sugg=document.getElementById(suggId);
  if(!sugg)return;
  clearTimeout(_addrDebounce[suggId]);
  if(q.length<3){sugg.innerHTML='';sugg.style.display='none';return;}
  _addrDebounce[suggId]=setTimeout(async()=>{
    try{
      const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5&countrycodes=au`,
        {headers:{'Accept-Language':'en-AU'}});
      if(!r.ok)throw new Error('HTTP '+r.status);
      const js=await r.json();
      if(!js.length){sugg.innerHTML='';sugg.style.display='none';return;}
      sugg.innerHTML=js.map(item=>`<div class="addr-sugg-item" onmousedown="addrPick('${input.id}','${suggId}',this)" data-val="${esc(item.display_name)}">${esc(item.display_name)}</div>`).join('');
      sugg.style.display='block';
    }catch(e){sugg.innerHTML='';sugg.style.display='none';}
  },400);
}
function addrPick(inputId,suggId,el){
  const input=document.getElementById(inputId);
  input.value=el.dataset.val;

}

/* ================= CUSTOM SELECT UPGRADE ================= */
let _cselOpen=null;
function upgradeSels(root){
  (root||document).querySelectorAll('select.input:not([data-csu])').forEach(sel=>{
    sel.setAttribute('data-csu','1');
    const wrap=document.createElement('div');
    wrap.className='csel';
    sel.parentNode.insertBefore(wrap,sel);
    wrap.appendChild(sel);
    sel.style.cssText='position:absolute;opacity:0;pointer-events:none;top:0;left:0;width:100%;height:100%';
    const cur=sel.options[sel.selectedIndex];
    const btn=document.createElement('button');
    btn.type='button';btn.className='input csel-btn';
    btn.innerHTML=`<span class="csel-cur">${esc(cur?cur.text:'')}</span><svg width="10" height="6" viewBox="0 0 10 6" class="csel-chev"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    wrap.insertBefore(btn,sel);
    const ul=document.createElement('ul');ul.className='csel-opts';ul.setAttribute('role','listbox');
    const rebuild=()=>{
      ul.innerHTML='';
      [...sel.options].forEach(opt=>{
        const li=document.createElement('li');
        li.className='csel-opt'+(opt.selected?' sel':'');
        li.setAttribute('role','option');li.dataset.v=opt.value;
        li.textContent=opt.text;
        li.addEventListener('mousedown',ev=>{ev.preventDefault();});
        li.addEventListener('click',()=>{
          sel.value=opt.value;
          btn.querySelector('.csel-cur').textContent=opt.text;
          ul.querySelectorAll('.csel-opt').forEach(x=>x.classList.remove('sel'));
          li.classList.add('sel');
          wrap.classList.remove('open');_cselOpen=null;
          sel.dispatchEvent(new Event('change',{bubbles:true}));
        });
        ul.appendChild(li);
      });
    };
    rebuild();
    // Re-sync if select options change dynamically
    const obs=new MutationObserver(rebuild);
    obs.observe(sel,{childList:true,subtree:true,attributes:true,attributeFilter:['selected']});
    wrap.appendChild(ul);
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      if(_cselOpen&&_cselOpen!==wrap){_cselOpen.classList.remove('open');}
      const willOpen=!wrap.classList.contains('open');
      wrap.classList.toggle('open',willOpen);
      _cselOpen=willOpen?wrap:null;
      if(willOpen){
        // Flip upward if not enough space below
        const r=wrap.getBoundingClientRect();
        ul.style.bottom=(r.bottom+250>window.innerHeight)?'calc(100% + 3px)':'';
        ul.style.top=(r.bottom+250>window.innerHeight)?'auto':'calc(100% + 3px)';
      }
    });
    // Keep hidden select in sync when changed externally
    sel.addEventListener('change',()=>{
      const chosen=sel.options[sel.selectedIndex];
      if(chosen)btn.querySelector('.csel-cur').textContent=chosen.text;
    });
  });
  document.addEventListener('click',()=>{if(_cselOpen){_cselOpen.classList.remove('open');_cselOpen=null;}},{once:false,capture:false});
}

function modal(title,bodyHTML,footHTML){
  const r=$('#modalRoot');
  r.innerHTML=`<div class="modal-back"><div class="modal" role="dialog" aria-label="${esc(title)}">
    <div class="mhead"><h3>${esc(title)}</h3><button class="btn ghost small" data-close>✕</button></div>
    <div class="mbody">${bodyHTML}</div><div class="mfoot">${footHTML||'<button class="btn" data-close>Close</button>'}</div></div></div>`;
  const back=r.querySelector('.modal-back');
  // Close-on-backdrop-click: only close if BOTH the press AND release happened on
  // the bare backdrop itself — using elementFromPoint at release time so that
  // pointer capture (which keeps touch events targeted at their origin element
  // even after the finger moves elsewhere) can't cause a false "outside" close.
  let downOnBackdrop=false;
  back.addEventListener('pointerdown',e=>{downOnBackdrop=(e.target===back);});
  back.addEventListener('pointerup',e=>{
    if(!downOnBackdrop)return;
    downOnBackdrop=false;
    const el=document.elementFromPoint(e.clientX,e.clientY);
    if(el===back)closeModal();
  });
  back.addEventListener('pointercancel',()=>{downOnBackdrop=false;});
  // [data-close] buttons (X, Cancel, etc.) — simple click is fine, press+release
  // both land on the button in normal use.
  back.addEventListener('click',e=>{
    if(e.target.closest('[data-close]'))closeModal();
  });
  return r;
}
function closeModal(){$('#modalRoot').innerHTML='';}

let BUD_OPEN=null; // id of the budget being edited, transient
const BUD_PER_MULT={w:52,m:12,b:2,y:1};
const yrOf=r=>num(r.amt)*(BUD_PER_MULT[r.per]||12);
function budList(){return FY().budgets=FY().budgets||[];}
function budGet(id){return budList().find(b=>b.id===id);}
function budScopeLabel(b){return b.scope==='all'?'⌂ Household':(pdot(person(b.scope))+' '+esc(person(b.scope).name));}
function defaultOpts(){return{medicare:true,mls:false,hasCover:true};}

};
function budNew(){
  if(lockedGuard())return;
  const opts=DB.people.map(p=>`<option value="${p.id}" ${DB.currentPid===p.id?'selected':''}>${esc(p.name)}</option>`).join('')
    +(DB.people.length>1?`<option value="all" ${isAll()?'selected':''}>⌂ Household (everyone)</option>`:'');
  const perPersonImport=DB.people.length>1?`<div id="importSection" style="display:none;margin-top:12px">
      <div class="note" style="margin-bottom:8px">Import rows from existing individual budgets (optional):</div>
      ${DB.people.map(p=>`<div class="fldrow" style="margin-bottom:6px"><div style="flex:1;font-size:.86rem;padding-top:8px">${pdot(p)} ${esc(p.name)}</div>
        <div style="flex:2"><select class="input bud-import-sel" data-pid="${p.id}"><option value="">— nothing —</option>
          ${(FY().budgets||[]).filter(b=>b.scope===p.id).map(b=>`<option value="${b.id}">${esc(b.name)}</option>`).join('')}</select></div></div>`).join('')}

    ${perPersonImport}`,

}
function budCreate(){
  const scope=$('#f_s').value;
  // Import rows from individual budgets if requested
  if(scope==='all'){
    const imports={};
    $$('.bud-import-sel').forEach(sel=>{if(sel.value)imports[sel.dataset.pid]=sel.value;});
    const scope2=$('#f_s').value;
    const b={id:uid(),name:$('#f_n').value.trim()||'Budget',scope:scope2,createdAt:todayISO(),
      incomes:[],deds:[],exps:[],opts:{},allocations:[]};
    const pids=DB.people.map(p=>p.id);
    pids.forEach(pid=>{b.opts[pid]=defaultOpts();});
    Object.entries(imports).forEach(([pid,bid])=>{
      const src2=budList().find(x=>x.id===bid);if(!src2)return;
      src2.incomes.forEach(r=>{b.incomes.push({...r,id:uid(),pid});});
      src2.deds.forEach(r=>{b.deds.push({...r,id:uid(),pid});});
      if(!b.exps.length)src2.exps.forEach(r=>{b.exps.push({...r,id:uid()});});
      if(src2.opts[pid])b.opts[pid]={...src2.opts[pid]};
    });
    if(!b.incomes.length)pids.forEach(pid=>{b.incomes.push({name:'Salary',amt:0,per:'m',pid});});
    if(!b.exps.length)b.exps.push({name:'Rent / mortgage',amt:0,per:'m'});
    if(!b.deds.length)budPrefillDeds(b,pids);
    budList().push(b);save();closeModal();BUD_OPEN=b.id;render();return;
  }
  const b={id:uid(),name:$('#f_n').value.trim()||'Budget',scope,createdAt:todayISO(),
    incomes:[],deds:[],exps:[],opts:{}};
  const pids=scope==='all'?DB.people.map(p=>p.id):[scope];
  pids.forEach(pid=>{b.opts[pid]=defaultOpts();b.incomes.push({name:'Salary',amt:0,per:'m',pid});});
  b.exps.push({name:'Rent / mortgage',amt:0,per:'m'});
  budPrefillDeds(b,pids);
  budList().push(b);save();closeModal();BUD_OPEN=b.id;render();
}
/* Pre-populate a new budget's "Pre-tax deductions" rows from each person's
   actual salary-sacrifice entries (Income page → Pre-tax deductions),
   so the budget starts in sync with what's really being deducted —
   editable from there. */
function budPrefillDeds(b,pids){
  pids.forEach(pid=>{
    (bucket(FY(),pid).preTaxDeds||[]).forEach(r=>{
      b.deds.push({name:r.name,amt:num(r.yearly),per:'y',pid});
    });
  });
}
function budDup(id){
  if(lockedGuard())return;
  const b=budGet(id);if(!b)return;
  const c=JSON.parse(JSON.stringify(b));c.id=uid();c.name=b.name+' (copy)';c.createdAt=todayISO();
  budList().push(c);save();render();toast('Budget duplicated');
}
function budTotals(y,b){
  const pids=b.scope==='all'?DB.people.map(p=>p.id):[b.scope];
  let gross=0,tax=0,perP={};
  pids.forEach(pid=>{
    const g=b.incomes.filter(r=>(r.pid||pids[0])===pid).reduce((s,r)=>s+yrOf(r),0);
    const d=b.deds.filter(r=>(r.pid||pids[0])===pid).reduce((s,r)=>s+yrOf(r),0);
    const taxable=Math.max(0,g-d);
    const t=fullTax(taxable,y.rates,b.opts[pid]||defaultOpts());
    perP[pid]={gross:g,deds:d,taxable,t};gross+=g;tax+=t.total;
  });
  const exps=b.exps.reduce((s,r)=>s+yrOf(r),0);
  const net=gross-tax, excess=net-exps;
  return{pids,perP,gross,tax,exps,net,excess};
}
function budRows(b,list,kind,withPerson){

        ${MONTHS.map((mo,mi)=>`<option value="${mi+1}" ${String(r.schedDay)===String(mi+1)?'selected':''}>${mo}</option>`).join('')}</select>`;
      if(per==='b'){
        const m1=num(r.schedDay)||1,m2=((m1-1+6)%12)+1;
        return `<td>${sel}<div class="muted" style="font-size:.7rem;margin-top:2px">+ ${MONTHS[m2-1]}</div></td>`;
      }
      return `<td>${sel}</td>`;
    }
    if(per==='w'){
      const DOW=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
      return `<td><select class="input" style="width:90px;font-size:.78rem" onchange="budSet('${b.id}','${kind}',${i},'schedDay',this.value,1)">
        ${DOW.map((d,di)=>`<option value="${di+1}" ${String(r.schedDay)===String(di+1)?'selected':''}>${d}</option>`).join('')}</select></td>`;
    }
    // monthly
    return `<td><input class="input" style="width:90px;font-size:.78rem" placeholder="Day (1-31)" title="Day of month (e.g. 15)" value="${r.schedDay||''}" oninput="budSet('${b.id}','${kind}',${i},'schedDay',this.value,1)"></td>`;
  };
  return list.map((r,i)=>`<tr>
    <td><input class="input" value="${esc(r.name)}" oninput="budSet('${b.id}','${kind}',${i},'name',this.value,1)"></td>
    ${psel(r,i)}
    <td class="num"><input class="input money" value="${r.amt}" oninput="budSet('${b.id}','${kind}',${i},'amt',this.value,1);renderBudgetCalc()"></td>
    <td><select class="input" onchange="budSet('${b.id}','${kind}',${i},'per',this.value);renderBudgetCalc();render()">
      <option value="w" ${r.per==='w'?'selected':''}>Weekly</option>
      <option value="m" ${(r.per||'m')==='m'?'selected':''}>Monthly</option>
      <option value="b" ${r.per==='b'?'selected':''}>Bi-annually</option>
      <option value="y" ${r.per==='y'?'selected':''}>Yearly</option></select></td>
    ${schedCell(r,i)}
    <td class="num bud-yr" data-kind="${kind}" data-i="${i}">${fmt$(yrOf(r))}</td>
    <td class="rowact"><button class="btn ghost small" onclick="if(!lockedGuard()){budGet('${b.id}').${kind}.splice(${i},1);save();render()}">✕</button></td></tr>`).join('');
}
function budSet(id,kind,i,k,v,quiet){
  if(FY().locked){if(!quiet)lockedGuard();return;}
  const b=budGet(id);if(!b)return;
  b[kind][i][k]=k==='amt'?v:(k==='name'?v:v);

}
function budOptSet(id,pid,k,v){

function renderBudgetCalc(){
  const el=$('#budCalc');if(!el)return;
  const y=FY(),b=BUD_OPEN&&budGet(BUD_OPEN);if(!b)return;
  $$('.bud-yr').forEach(td=>{td.textContent=fmt$(yrOf(b[td.dataset.kind][td.dataset.i]));});

    if(o.medicare)taxSubs.push({n:'Medicare levy',v:-x.t.medicare});

    rows+=grp(pfx+'t','Tax payable',-x.t.total,taxSubs,'color:var(--red)');

  if(hh)rows+=plain('<b>Household net income</b>',r.net,{c:'color:var(--euc)'});
  const expSubs=b.exps.map(q=>({n:q.name||'Expense',v:-yrOf(q)}));

function renderBudgetAlloc(b,excess){

function budAllocSet(id,i,k,v){const b=budGet(id);if(b)b.allocations[i][k]=k==='pct'?v:v;save();renderBudgetCalc();}
function budAllocAdd(id){const b=budGet(id);if(b){b.allocations.push({id:uid(),itemId:'',pct:0});save();renderBudgetAlloc(b,0);}}
function budAllocRemove(id,i){const b=budGet(id);if(b){b.allocations.splice(i,1);save();renderBudgetCalc();}}
function budAllocProjection(b,excess){
  const allocs=(b.allocations||[]).filter(a=>a.itemId&&num(a.pct)>0);
  if(!allocs.length)return '';
  const periods=[{y:1,l:'1 yr'},{y:2,l:'2 yrs'},{y:5,l:'5 yrs'},{y:10,l:'10 yrs'}];
  const rows=allocs.map(a=>{
    const it=DB.nw.items.find(x=>x.id===a.itemId);if(!it)return'';
    const es=nwEntriesOf?.(it.id)||[];
    const cur=es.length?num(es[es.length-1].value):0;
    const monthly=excess/12*num(a.pct)/100;
    const cells=periods.map(p=>`<td class="num">${fmt$0(cur+monthly*12*p.y)}</td>`).join('');
    return `<tr><td>${esc(it.name)}</td><td class="num">${fmt$0(cur)}</td>${cells}</tr>`;
  }).join('');
  if(!rows)return '';
  const hdrs=periods.map(p=>`<th class="num">+${p.l}</th>`).join('');
  return `<table class="tbl mt" style="font-size:.84rem"><thead><tr><th>Item</th><th class="num">Today</th>${hdrs}</tr></thead><tbody>${rows}</tbody></table>`;
}
const DONUT_COLS=['#2E7D5B','#B8860B','#2563B8','#B4452F','#E2925A','#7A6FB3','#4FA3A5','#9A7B4F','#5BA742','#A14F86'];
function donutSVG(segs){
  const tot=segs.reduce((s,x)=>s+x.v,0);if(!tot)return '<div class="muted">Add expenses to see the split.</div>';
  let a=-Math.PI/2,paths='';const cx=80,cy=80,r1=78,r0=46;
  segs.forEach((s,i)=>{const frac=s.v/tot,a2=a+frac*2*Math.PI;
    const large=frac>.5?1:0;
    const p=(rr,ang)=>`${cx+rr*Math.cos(ang)},${cy+rr*Math.sin(ang)}`;
    paths+=`<path d="M${p(r1,a)} A${r1},${r1} 0 ${large} 1 ${p(r1,a2)} L${p(r0,a2)} A${r0},${r0} 0 ${large} 0 ${p(r0,a)} Z" fill="${DONUT_COLS[i%DONUT_COLS.length]}" opacity=".92"><title>${esc(s.n)}: ${fmt$(s.v)}</title></path>`;a=a2;});
  const leg=segs.map((s,i)=>`<div><span class="sw" style="background:${DONUT_COLS[i%DONUT_COLS.length]}"></span>${esc(s.n)} — <b>${fmt$(s.v)}</b> (${(s.v/tot*100).toFixed(1)}%)</div>`).join('');
  return `<div class="donutwrap"><svg width="160" height="160" viewBox="0 0 160 160" role="img" aria-label="Cash split">${paths}</svg><div class="donutleg">${leg}</div></div>`;
}

}

function incRecChange(v){

  const el=$('#incDateRow');if(el)el.style.display=show?'flex':'none';
  // Keep the displayed amount meaningful across a recurrence change: convert
  // to yearly using the OLD recurrence's multiplier, then back to the
  // current mode using the NEW recurrence's multiplier.
  const recSel=$('#f_rec'),amode=$('#f_amode');
  const prevRec=recSel.dataset.prev||'monthly';
  if(amode&&amode.value==='period'){

function wfhTotals(y,b){

  const days=Object.values(b.wfh.days).filter(v=>v==='wfh').length;
  const hpd=b.wfh.hoursPerDay||y.rates.wfh.hoursPerDay;
  const claim=days*hpd*y.rates.wfh.ratePerHour;
  return{days,hpd,claim};
}
PAGES.wfh=m=>{
  const y=FY(),B=PD();
  const hol={};fyHolidays(y).forEach(h=>hol[h.date]=h.name);
  const t=wfhTotals(y,B);
  const pp=person(DB.currentPid);const pCol=(pp&&pp.wfhColors)||{};
  const wfhCol=pCol.wfh||'#2563B8'; const awayCol=pCol.away||'#7A6FB3';
  m.style.setProperty('--wfh-user',wfhCol); m.style.setProperty('--away-user',awayCol);
  head(m,'WFH tracker',`Click a weekday to cycle: <b>office → WFH → away</b>, or fill a whole range at once. Weekends and Victorian public holidays are excluded automatically; away (leave) days are yours, tracked separately from public holidays.`,

     <button class="btn small" onclick="refreshHolidays(FY())" title="Re-check public holidays against data.vic.gov.au">↻ Check holidays online</button>`);
  m.insertAdjacentHTML('beforeend',`

    <div class="stat"><div class="l">Total WFH days</div><div class="v">${t.days}</div></div>
    <div class="stat"><div class="l">Hours / day × rate</div><div class="v">${t.hpd} × ${(y.rates.wfh.ratePerHour*100).toFixed(0)}c</div>
      <div class="d"><button class="btn small" onclick="wfhHours()">Change hours/day</button></div></div>
    <div class="stat gold"><div class="l">Total claimable</div><div class="v">${fmt$(t.claim)}</div><div class="d">fixed-rate method (${esc(y.label)})</div></div>
  </div>
  <div class="cal-legend">
    <span><span class="sw" style="background:${wfhCol}"></span>WFH</span>
    <span><span class="sw" style="background:var(--surface);border:1px solid var(--line2)"></span>Office</span>
    <span><span class="sw" style="background:${awayCol}"></span>Away / leave</span>
    <span><span class="sw" style="background:var(--grey-cell)"></span>Public holiday</span>
    <span><span class="sw" style="background:var(--orange-soft);border-color:var(--orange)"></span>Weekend</span>
  </div>
  <div class="card"><div class="cbody"><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:8px 26px" id="calwrap"></div></div></div>`);
  const wrap=$('#calwrap');
  const months=[];for(let k=0;k<12;k++){const mo=(6+k)%12,yr=y.startYear+(mo<6?1:0);months.push([yr,mo]);}
  const dows=['Su','Mo','Tu','We','Th','Fr','Sa'];
  months.forEach(([yr,mo])=>{
    const first=new Date(Date.UTC(yr,mo,1));
    const dim=new Date(Date.UTC(yr,mo+1,0)).getUTCDate();
    let cells=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
    for(let b=0;b<first.getUTCDay();b++)cells+='<div class="cal-day empty"></div>';
    let cnt=0;
    for(let d=1;d<=dim;d++){
      const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dow=new Date(ds+'T00:00:00Z').getUTCDay();
      let cls='',tip='';
      if(dow===0||dow===6)cls='weekend';
      else if(hol[ds]){cls='holiday';tip=hol[ds];}
      else{const st=B.wfh.days[ds];if(st==='wfh'){cls='wfh';cnt++;}else if(st==='away'){cls='away';tip='Away / leave';}}
      cells+=`<div class="cal-day ${cls}" ${cls==='weekend'||cls==='holiday'?'':`onclick="wfhCycle('${ds}')"`} title="${esc(tip)}">${d}</div>`;
    }
    const name=first.toLocaleString('en-AU',{month:'long',timeZone:'UTC'});
    wrap.insertAdjacentHTML('beforeend',`<div class="cal-month"><div class="cal-mname">${name} ${yr} <span class="muted" style="font-weight:400;font-size:.78rem">· ${cnt} WFH</span></div><div class="cal-grid">${cells}</div></div>`);

function wfhBulkApply(){
  const y=FY(),B=PD();
