<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='15' fill='%231E6B4C'/%3E%3Ctext x='32' y='46' font-family='Arial,Helvetica,sans-serif' font-size='40' font-weight='800' fill='%23ffffff' text-anchor='middle'%3E%24%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<!-- AUTH GATE -->
<div id="authGate" style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 0%,color-mix(in srgb,var(--euc) 7%,var(--bg)) 0%,var(--bg) 60%);padding:24px">
  <div style="width:100%;max-width:380px;text-align:center;background:var(--surface);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow-lg);padding:40px 32px 34px">
    <svg width="56" height="56" viewBox="0 0 56 56" style="margin-bottom:18px" aria-hidden="true">
      <defs><linearGradient id="authMark" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2B8A63"/><stop offset="1" stop-color="#15543A"/></linearGradient></defs>
      <rect width="56" height="56" rx="15" fill="url(#authMark)"/>
      <line x1="14" y1="21" x2="42" y2="21" stroke="#fff" stroke-width="2.2" stroke-linecap="round" opacity=".92"/>
      <line x1="14" y1="29" x2="42" y2="29" stroke="#fff" stroke-width="2.2" stroke-linecap="round" opacity=".92"/>
      <line x1="14" y1="37" x2="33" y2="37" stroke="#fff" stroke-width="2.2" stroke-linecap="round" opacity=".6"/>
      <circle cx="43.5" cy="14.5" r="5.5" fill="#C99B33"/>
    </svg>
    <h1 style="font-family:'Plus Jakarta Sans','Inter',sans-serif;font-size:1.7rem;font-weight:600;letter-spacing:-.01em;margin-bottom:5px;color:var(--ink)">Ledger</h1>
    <p style="color:var(--muted);margin-bottom:30px;font-size:.88rem">Personal Australian finance tracker</p>
    <div id="authSetupNote" style="display:none;background:var(--surface2);border-radius:var(--radius);padding:12px 14px;margin-bottom:18px;font-size:.82rem;color:var(--muted);text-align:left;line-height:1.7"></div>
    <button id="authSignInBtn" class="btn primary" style="width:100%;height:48px;font-size:.95rem;display:flex;align-items:center;justify-content:center;gap:10px;border-radius:10px" onclick="authSignIn()">
      <svg width="18" height="18" viewBox="0 0 18 18" style="flex-shrink:0"><path fill="rgba(255,255,255,.9)" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.013 17.64 11.705 17.64 9.2z"/><path fill="rgba(255,255,255,.9)" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="rgba(255,255,255,.9)" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="rgba(255,255,255,.9)" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
      Sign in with Google
    </button>
    <div style="display:flex;align-items:center;gap:10px;margin:18px 0 14px">
      <div style="flex:1;height:1px;background:var(--line)"></div>
      <span style="font-size:.75rem;color:var(--muted);white-space:nowrap">or</span>
      <div style="flex:1;height:1px;background:var(--line)"></div>
    </div>
    <button id="offlineModeBtn" class="btn" style="width:100%;height:44px;font-size:.9rem;display:flex;align-items:center;justify-content:center;gap:8px;border-radius:10px" onclick="enterOfflineMode()">
      ✈︎ Open offline
    </button>
    <div id="authError" style="display:none;margin-top:14px;padding:11px 13px;background:var(--surface2);border:1px solid var(--red);border-radius:var(--radius);font-size:.86rem;color:var(--red);text-align:left;line-height:1.5"></div>
    <p style="color:var(--muted);font-size:.76rem;margin-top:18px">This app is private — only the registered account can sign in.</p>
  </div>
</div>
<!-- OFFLINE BANNER (shown when running without Google Drive) -->
<div id="offlineBanner" style="display:none;position:sticky;top:0;z-index:900;background:#92600a;color:#fff;padding:9px 16px;font-size:.82rem;align-items:center;gap:10px;flex-wrap:wrap">
  <span style="flex:1;min-width:0">✈︎ <b>Offline mode</b> — changes are stored in this browser only. Export a backup before you leave so your data isn't lost.</span>
  <button onclick="exportAll()" style="background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:6px;padding:5px 12px;font-size:.8rem;cursor:pointer;white-space:nowrap;font-family:inherit">Export now</button>
  <button onclick="offlineBannerDismiss()" style="background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;padding:2px 6px;font-size:1rem;line-height:1" title="Dismiss until next page load">✕</button>
</div>
<!-- APP SHELL (hidden until authenticated) -->
<div id="appShell" style="display:contents"><div class="app">
  <aside class="sidebar">
    <div class="brand">
      <span style="display:inline-flex;align-items:center">
        <svg width="22" height="22" viewBox="0 0 56 56" style="margin-right:7px;flex:none" aria-hidden="true">
          <defs><linearGradient id="navMark" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2B8A63"/><stop offset="1" stop-color="#15543A"/></linearGradient></defs>
          <rect width="56" height="56" rx="15" fill="url(#navMark)"/>
          <line x1="14" y1="21" x2="42" y2="21" stroke="#fff" stroke-width="2.6" stroke-linecap="round" opacity=".92"/>
          <line x1="14" y1="29" x2="42" y2="29" stroke="#fff" stroke-width="2.6" stroke-linecap="round" opacity=".92"/>
          <line x1="14" y1="37" x2="33" y2="37" stroke="#fff" stroke-width="2.6" stroke-linecap="round" opacity=".6"/>
          <circle cx="43.5" cy="14.5" r="6" fill="#C99B33"/>
        </svg>
        <div class="t">Ledger</div>
      </span>
      <button id="privacyBtn" onclick="privacyToggle()" title="Hide all dollar values (for demos)" style="background:none;border:none;cursor:pointer;font-size:1.1rem;line-height:1;padding:2px 6px;margin-left:2px;opacity:.75">👁</button>
      <button class="nav-toggle" id="navToggle" onclick="navToggle()" aria-expanded="false" aria-controls="navCollapse">
        <span id="navToggleLabel">Menu</span><span class="nav-toggle-icon">▾</span>
      </button>
    </div>
    <div class="nav-collapse" id="navCollapse">
    <div class="fy-pick">
      <label for="fySelect">Financial year</label>
      <select id="fySelect" class="input"></select>
      <label style="margin-top:10px;display:block">Viewing as</label>
      <div id="peopleSwitch" class="pchips"></div>
      <label style="margin-top:10px;display:block" for="assetSearchInput">Find an asset</label>
      <input id="assetSearchInput" class="input" placeholder="Search by name or code…" oninput="assetSearchInput(this.value)" autocomplete="off">
      <div id="assetSearchResults" style="position:relative"></div>
    </div>
    <nav class="nav" id="nav">
      <div class="grp">Plan</div>
      <button data-page="dashboard"><span class="tabchip" style="background:var(--euc)"></span>Dashboard</button>
      <button data-page="budget"><span class="tabchip" style="background:var(--euc)"></span>Budget planner</button>
      <div class="grp">Income</div>
      <button data-page="income"><span class="tabchip" style="background:var(--blue)"></span>Income</button>
      <button data-page="dividends"><span class="tabchip" style="background:var(--blue)"></span>Share dividends</button>
      <button data-page="funds"><span class="tabchip" style="background:var(--blue)"></span>ETF / Managed Funds</button>
      <button data-page="sales"><span class="tabchip" style="background:var(--blue)"></span>Share sales</button>
      <div class="grp">Expenses</div>
      <button data-page="expenses"><span class="tabchip" style="background:var(--red)"></span>Expenses</button>
      <div class="grp">Deductions</div>
      <button data-page="other"><span class="tabchip" style="background:var(--orange)"></span>Deductions</button>
      <button data-page="wfh"><span class="tabchip" style="background:var(--orange)"></span>WFH tracker</button>
      <div class="grp">Wealth</div>
      <button data-page="assets"><span class="tabchip" style="background:var(--gold)"></span>Assets</button>
      <button data-page="super"><span class="tabchip" style="background:var(--gold)"></span>Superannuation</button>
      <button data-page="networth"><span class="tabchip" style="background:var(--gold)"></span>Net worth</button>
      <div class="grp">Reports</div>
      <button data-page="summary"><span class="tabchip" style="background:var(--purple)"></span>FY summary</button>
      <button data-page="trends"><span class="tabchip" style="background:var(--purple)"></span>Trends</button>
      <button data-page="mytax"><span class="tabchip" style="background:var(--purple)"></span>myTax mapping</button>
      <button data-page="documents"><span class="tabchip" style="background:var(--purple)"></span>Documents</button>
      <div class="grp">Configure</div>
      <button data-page="settings" aria-label="Settings"><span class="tabchip" style="background:var(--muted)"></span>Settings</button>
    </nav>
    <div class="sidefoot" style="flex-direction:column;align-items:stretch;gap:8px">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px"><span id="syncStatus" style="font-size:.73rem;color:var(--muted)"></span><button class="btn ghost small" id="syncNowBtn" style="display:none;font-size:.73rem" onclick="if(typeof pushToDrive==='function')pushToDrive().then(()=>toast(_syncStatus==='error'?'Sync failed — see status above':'Pushed to Drive'))">↻ Sync</button></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn small" id="exportBtn" title="Download a JSON backup of all data">Export</button>
      <button class="btn small" id="importBtn" title="Restore from a JSON backup">Import</button>
      <button class="btn small theme-toggle" id="themeBtn" aria-label="Toggle light/dark theme">◐</button>
      <input type="file" id="importFile" accept="application/json" style="display:none">
    </div>
    </div>
    </div>
  </aside>
  <div style="overflow-y:auto;height:100%;min-width:0">
    <main class="main" id="main"></main>
  </div>
</div></div><!-- /appShell -->
<div id="toast" role="status"></div>
<div id="modalRoot"></div>
<script src="app.js"></script>
</body>
</html>
